name: HoopsHype coaching feed

on:
  schedule:
    # Every 6 hours. Cron is ALWAYS UTC and does not follow daylight saving.
    # It also runs best-effort: expect delays and the occasional skipped run.
    # The archive in items.json means a skipped run loses nothing.
    - cron: "0 */6 * * *"
  workflow_dispatch: # gives you a "Run workflow" button for manual testing

permissions:
  contents: write # to commit items.json + docs/feed.xml back

concurrency:
  group: coaching-feed
  cancel-in-progress: false

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python3 -m pip install -r requirements.txt

      - name: Fetch rumors and rebuild feed
        run: python3 rumors.py

      - name: Publish
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json docs/feed.xml
          git diff --quiet --staged || git commit -m "feed: $(date -u '+%F %H:%M')"
          git push
